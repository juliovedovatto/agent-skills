<!doctype html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>LinkedIn Square Template</title>
  <link rel="stylesheet" href="./template.css" />
</head>
<body>
  <main class="canvas">
    <div class="grid"></div>
    <section class="content">
      <!-- HEADLINE START: edit text and optional .accent span -->
      <h1 class="headline"><span class="accent">Topic:</span> Clear Headline,<br />Second Line</h1>
      <!-- HEADLINE END -->

      <!-- CODE EDITOR START: edit filename, line numbers, label, and code lines -->
      <div class="editor" aria-label="Code editor example">
        <div class="topbar">
          <span class="dot red"></span>
          <span class="dot amber"></span>
          <span class="dot green"></span>
          <span class="filename">component.html</span>
        </div>
        <div class="code-area">
          <div class="line-gutter">
            <span class="ln">1</span>
            <span class="ln">2</span>
            <span class="ln">3</span>
          </div>
          <div class="code-block">
            <span class="code-label">label</span>
            <span class="code-line"><span class="tag">&lt;div</span> <span class="attr">class</span>=<span class="str">"relative <span class="iso">isolate</span>"</span><span class="tag">&gt;</span></span>
            <span class="code-line"><span class="indent"></span><span class="tag">&lt;div</span> <span class="attr">class</span>=<span class="str">"absolute <span class="z">z-10</span>"</span><span class="tag">&gt;</span><span class="text-node">Content</span><span class="tag">&lt;/div&gt;</span></span>
            <span class="code-line"><span class="tag">&lt;/div&gt;</span></span>
          </div>
        </div>
      </div>
      <!-- CODE EDITOR END -->

      <!-- BULLETS START: edit bullet rows; use .highlight, .blue if useful -->
      <ul class="bullets">
        <li><span class="bullet-dot"></span><span>First concise point with <span class="blue">key phrase</span></span></li>
        <li><span class="bullet-dot"></span><span>Second concise point</span></li>
        <li><span class="bullet-dot"></span><span>Third concise point with <span class="highlight">emphasis</span></span></li>
      </ul>
      <!-- BULLETS END -->

      <!-- PAGINATION START: keep for carousel images; delete this block for single-image posts -->
      <div class="pagination" aria-label="Slide pagination">
        <div class="pagination-dots" aria-hidden="true">
          <span class="pagination-dot is-active"></span>
          <span class="pagination-dot"></span>
          <span class="pagination-dot"></span>
          <span class="pagination-dot"></span>
        </div>
        <span class="pagination-count">1/4</span>
      </div>
      <!-- PAGINATION END -->
    </section>
  </main>
</body>
</html>
